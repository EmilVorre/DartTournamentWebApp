name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    uses: EmilVorre/reuseable-workflows/.github/workflows/rust-lint.yml@v1
    with:
      rust-toolchain: stable

  build:
    uses: EmilVorre/reuseable-workflows/.github/workflows/rust-build.yml@v1
    needs: lint
    with:
      rust-toolchain: stable

  test:
    uses: EmilVorre/reuseable-workflows/.github/workflows/rust-test.yml@v1
    needs: build
    with:
      rust-toolchain: stable

  package:
    uses: EmilVorre/reuseable-workflows/.github/workflows/rust-package.yml@v1
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    with:
      rust-toolchain: stable
      dockerfile-path: "./Dockerfile"
      image-name: dart-tournament-web

  image-for-deploy:
    runs-on: ubuntu-latest
    needs: package
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - id: ref
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/dart-tournament-web@${{ needs.package.outputs.image-digest }}" >> $GITHUB_OUTPUT

  deploy:
    uses: EmilVorre/reuseable-workflows/.github/workflows/k8s-deploy.yml@v1
    needs: [package, image-for-deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    with:
      image: ${{ needs.image-for-deploy.outputs.image }}
      deployment: dart
      container: dart
      namespace: dart
    secrets:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
